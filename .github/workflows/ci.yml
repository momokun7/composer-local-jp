name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync
      - name: Syntax check
        run: uv run python -m py_compile composer_local/cli.py && uv run python -m py_compile composer_local/environment.py && uv run python -m py_compile composer_local/errors.py && uv run python -m py_compile composer_local/utils.py && uv run python -m py_compile composer_local/constants.py
      - name: Ruff lint
        run: uv run ruff check composer_local/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov --cov-report=term-missing
